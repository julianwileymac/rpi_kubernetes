# =============================================================================
# __APP_NAME__ Ingress
# =============================================================================
# Accessible at http://__APP_HOST__
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __APP_NAME__
  namespace: __APP_NAMESPACE__
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  ingressClassName: nginx
  rules:
    - host: __APP_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: __APP_NAME__
                port:
                  number: __APP_PORT__
