# =============================================================================
# __APP_NAME__ ConfigMap
# =============================================================================
# Non-sensitive configuration. Referenced by the Deployment via envFrom.
#
# Cross-namespace service FQDN pattern:
#   <service>.<namespace>.svc.cluster.local:<port>
#
# Common cluster endpoints:
#   PostgreSQL: postgresql.data-services.svc.cluster.local:5432
#   MinIO:      minio.data-services.svc.cluster.local:9000
#   MLflow:     mlflow.ml-platform.svc.cluster.local:5000
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: __APP_NAME__-config
  namespace: __APP_NAMESPACE__
data:
  APP_HOST: "0.0.0.0"
  APP_PORT: "__APP_PORT__"
  # Add application-specific configuration below
  # DATABASE_URL: "postgresql://user:pass@postgresql.data-services.svc.cluster.local:5432/mydb"
  # S3_ENDPOINT: "http://minio.data-services.svc.cluster.local:9000"
