# =============================================================================
# __APP_NAME__ Secret
# =============================================================================
# Sensitive credentials. Referenced by the Deployment via envFrom.
# IMPORTANT: Change all default values before deploying to production.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: __APP_NAME__-credentials
  namespace: __APP_NAMESPACE__
  labels:
    app: __APP_NAME__
type: Opaque
stringData:
  # Add application-specific secrets below
  SECRET_KEY: "changeme"
  # DB_PASSWORD: "changeme"
  # API_KEY: "changeme"
