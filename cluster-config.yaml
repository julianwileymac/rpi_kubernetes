cluster:
  name: rpi-k8s-cluster
  domain: local
  kubeconfig_path: ./kubeconfig.yaml
control_plane:
  hostname: k8s-control
  ip: 192.168.12.112
  user: julia
  arch: amd64
  gpu_enabled: true
workers:
- name: rpi1
  ip: 192.168.12.49
  user: julian
  arch: arm64
  storage_device: /dev/sda
- name: rpi2
  ip: 192.168.12.88
  user: julian
  arch: arm64
  storage_device: /dev/sda
- name: rpi3
  ip: 192.168.12.170
  user: julian
  arch: arm64
  storage_device: /dev/sda
- name: rpi4
  ip: 192.168.12.235
  user: julian
  arch: arm64
  storage_device: /dev/sda
network:
  gateway: 192.168.12.1
  pod_cidr: 10.42.0.0/16
  service_cidr: 10.43.0.0/16
  metallb_pool: 192.168.12.200-192.168.12.250
k3s:
  version: v1.29.0+k3s1
  token_file: ./k3s_token.txt
  server_args:
  - --disable=traefik
  - --disable=local-storage
  - --flannel-backend=vxlan
  - --write-kubeconfig-mode=644
  agent_args:
  - --node-label=kubernetes.io/arch=arm64
  - --node-label=hardware/type=raspberry-pi
  - --node-label=hardware/model=rpi5
ssh:
  key_path: ~/.ssh/id_ed
  default_user: julian
  timeout: 30
storage:
  mount_point: /mnt/storage
  directories:
  - data
  - mlruns
  - postgresql
  - minio
  - jupyterhub
discovery:
  enabled: true
  primary_method: mdns
  mdns_domain: local
  network_range: auto
  hostname_pattern: rpi*
  cache_file: ~/.rpi-cluster/node-cache.json
  cache_ttl: 3600
health_monitoring:
  enabled: true
  check_interval: 60
  max_consecutive_failures: 3
  auto_update_ips: true
