apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-bootstrap-user-code
  namespace: mlops
data:
  definitions.py: |
    from dagster import Definitions, job, op


    @op
    def dagster_bootstrap_healthcheck() -> str:
        return "ok"


    @job
    def dagster_bootstrap_job():
        dagster_bootstrap_healthcheck()


    defs = Definitions(jobs=[dagster_bootstrap_job])
