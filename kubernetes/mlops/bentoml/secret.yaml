# =============================================================================
# PostgreSQL Credentials for BentoML
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: yatai-postgresql
  namespace: ml-platform
type: Opaque
stringData:
  host: postgresql.data-services.svc.cluster.local
  port: "5432"
  database: bentoml
  user: bentoml
  password: bentoml123
---
# =============================================================================
# MinIO Credentials for BentoML Artifact Storage
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: yatai-minio
  namespace: ml-platform
type: Opaque
stringData:
  endpoint: minio.data-services.svc.cluster.local:9000
  accesskey: minioadmin
  secretkey: minioadmin123
  bucket: bentoml-artifacts
