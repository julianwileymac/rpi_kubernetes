apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster-argo-workflow-submitter
  namespace: mlops
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
      - workflowtemplates
      - cronworkflows
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster-argo-workflow-submitter
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: dagster
    namespace: mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster-argo-workflow-submitter

