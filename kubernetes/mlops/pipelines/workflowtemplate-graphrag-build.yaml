apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pipeline-graphrag-build
  namespace: mlops
  labels:
    app.kubernetes.io/name: pipeline-graphrag-build
    app.kubernetes.io/component: orchestration
spec:
  serviceAccountName: argo-workflow
  entrypoint: graphrag-build
  arguments:
    parameters:
      - name: pipeline_image
        value: ghcr.io/julianwiley/rpi-k8s-pipelines:latest
      - name: source_key
        value: ""
      - name: source_bucket
        value: dagster-artifacts
      - name: entities_collection
        value: graphrag_entities
      - name: relations_collection
        value: graphrag_relations
      - name: passages_collection
        value: graphrag_passages
      - name: embedding_provider
        value: deterministic
      - name: embedding_model
        value: all-MiniLM-L6-v2
  templates:
    - name: graphrag-build
      dag:
        tasks:
          - name: extract-and-index
            template: build-graph
            arguments:
              parameters:
                - name: pipeline_image
                  value: "{{workflow.parameters.pipeline_image}}"
                - name: source_key
                  value: "{{workflow.parameters.source_key}}"
                - name: source_bucket
                  value: "{{workflow.parameters.source_bucket}}"
                - name: entities_collection
                  value: "{{workflow.parameters.entities_collection}}"
                - name: relations_collection
                  value: "{{workflow.parameters.relations_collection}}"
                - name: passages_collection
                  value: "{{workflow.parameters.passages_collection}}"
                - name: embedding_provider
                  value: "{{workflow.parameters.embedding_provider}}"
                - name: embedding_model
                  value: "{{workflow.parameters.embedding_model}}"

    - name: build-graph
      inputs:
        parameters:
          - name: pipeline_image
          - name: source_key
          - name: source_bucket
          - name: entities_collection
          - name: relations_collection
          - name: passages_collection
          - name: embedding_provider
          - name: embedding_model
      container:
        image: "{{inputs.parameters.pipeline_image}}"
        command:
          - python
          - -c
          - |
            import hashlib, json, re, sys
            from pipelines.config import PipelineConfig
            from pipelines.document_loaders import load_minio_object
            from pipelines.chunking import chunk_documents
            from pipelines.embeddings import EmbeddingProvider
            from pipelines.vector_io import upsert_milvus

            config = PipelineConfig()
            source_key = "{{inputs.parameters.source_key}}"
            source_bucket = "{{inputs.parameters.source_bucket}}"

            embedder = EmbeddingProvider(
                provider="{{inputs.parameters.embedding_provider}}",
                model_name="{{inputs.parameters.embedding_model}}",
            )

            docs = load_minio_object(config, bucket=source_bucket, key=source_key)
            if not docs:
                print("No documents loaded"); sys.exit(0)
            full_text = "\n\n".join(d.text for d in docs)

            # Entity extraction (rule-based; swap for LLM in production)
            sentences = [s.strip() for s in re.split(r"[.!?]\s+", full_text) if len(s.strip()) > 20]
            entities, relations = [], []
            seen = set()
            for sent in sentences[:500]:
                words = re.findall(r"\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*\b", sent)
                for w in words:
                    if w not in seen:
                        seen.add(w)
                        eid = hashlib.sha1(w.encode()).hexdigest()[:16]
                        entities.append({"id": eid, "text": w, "embedding": embedder.embed_text(w),
                                         "metadata": {"source_key": source_key, "type": "entity"}})
                el = list(set(words))
                for i in range(len(el)):
                    for j in range(i+1, len(el)):
                        rid = hashlib.sha1(f"{el[i]}:{el[j]}".encode()).hexdigest()[:16]
                        rt = f"{el[i]} -- related_to -- {el[j]}"
                        relations.append({"id": rid, "text": rt, "embedding": embedder.embed_text(rt),
                                          "metadata": {"source_key": source_key, "type": "relation"}})

            # Passage chunking
            texts = [d.text for d in docs]
            chunks = chunk_documents(texts, strategy="recursive", chunk_size=800, chunk_overlap=200)
            chunk_texts = [c.text for c in chunks]
            embs = embedder.embed_texts(chunk_texts)
            passages = [{"id": hashlib.sha1(f"{source_key}:p:{i}".encode()).hexdigest(),
                          "text": c.text, "embedding": e,
                          "metadata": {"source_key": source_key, "chunk_index": i}}
                         for i, (c, e) in enumerate(zip(chunks, embs))]

            ec = upsert_milvus(config.milvus_host, config.milvus_port,
                               "{{inputs.parameters.entities_collection}}", entities, embedder.dimension)
            rc = upsert_milvus(config.milvus_host, config.milvus_port,
                               "{{inputs.parameters.relations_collection}}", relations, embedder.dimension)
            pc = upsert_milvus(config.milvus_host, config.milvus_port,
                               "{{inputs.parameters.passages_collection}}", passages, embedder.dimension)
            print(json.dumps({"entities": ec, "relations": rc, "passages": pc}))
        envFrom:
          - secretRef:
              name: pipeline-sink-credentials
        env:
          - name: EMBEDDING_PROVIDER
            value: "{{inputs.parameters.embedding_provider}}"
          - name: EMBEDDING_MODEL
            value: "{{inputs.parameters.embedding_model}}"
