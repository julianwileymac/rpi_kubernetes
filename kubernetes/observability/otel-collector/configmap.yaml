apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    # =============================================================================
    # OpenTelemetry Collector Configuration
    # =============================================================================
    
    receivers:
      # OTLP receiver for traces and metrics from applications
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Collect Kubernetes container logs from node filesystem
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_path: true
        start_at: beginning
        operators:
          - id: container-parser
            type: container
      
      # Prometheus receiver for scraping metrics
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 30s
              static_configs:
                - targets: ['localhost:8888']
      
      # Host metrics for node-level monitoring
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu:
          disk:
          filesystem:
          load:
          memory:
          network:
          process:
            include:
              match_type: regexp
              names: ['.*']
      
      # Kubernetes container logs (CRI / containerd)
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/kube-system_*/*/*.log
        start_at: end
        operators:
          - type: container
    
    processors:
      # Batch processor for efficient export
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # Enrich telemetry with Kubernetes metadata
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.node.name
      
      # Memory limiter to prevent OOM
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      
      # Resolve k8s metadata for pod logs (uses pod UID from filelog / container operator)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        node_from_env_var: K8S_NODE_NAME
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
      
      # Resource processor to add cluster metadata
      resource:
        attributes:
          - key: cluster.name
            value: rpi-k8s-cluster
            action: upsert
          - key: deployment.environment
            value: development
            action: upsert
      
      # Attributes processor for trace enrichment
      attributes:
        actions:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
      
      # Span processor for Milvus trace enrichment
      span:
        name:
          from_attributes: [db.system, db.operation]
          separator: "/"
      
      # Attributes for vector-db spans (Milvus, ChromaDB)
      attributes/vectordb:
        actions:
          - key: vectordb.cluster
            value: rpi-k8s-cluster
            action: upsert
          - key: vectordb.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: trace.source
            value: milvus-standalone
            action: insert
    
    exporters:
      # Jaeger exporter for traces
      otlp/jaeger:
        endpoint: jaeger-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true
      
      # Prometheus exporter for metrics
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: otel
        send_timestamps: true
      
      # VictoriaMetrics remote_write for long-term metrics storage
      prometheusremotewrite/victoriametrics:
        endpoint: http://victoriametrics.observability:8428/api/v1/write
        external_labels:
          cluster: rpi-k8s-cluster
      
      # Loki exporter for logs
      loki:
        endpoint: http://loki.observability:3100/loki/api/v1/push
        default_labels_enabled:
          exporter: true
          job: true
          instance: true
          level: true
      
      # Debug logging (reduce in production)
      logging:
        verbosity: normal
        sampling_initial: 5
        sampling_thereafter: 200
    
    extensions:
      # Health check endpoint
      health_check:
        endpoint: 0.0.0.0:13133
      
      # Performance profiling (disable in production)
      pprof:
        endpoint: 0.0.0.0:1777
      
      # zPages for debugging
      zpages:
        endpoint: 0.0.0.0:55679
    
    service:
      extensions: [health_check, pprof, zpages]
      
      pipelines:
        # Traces pipeline
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, attributes, attributes/vectordb, span, batch]
          exporters: [otlp/jaeger, logging]
        
        # Metrics pipeline - export to both Prometheus and VictoriaMetrics
        metrics:
          receivers: [otlp, prometheus, hostmetrics]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheus, prometheusremotewrite/victoriametrics, logging]
        
        # Logs pipeline - OTLP + Kubernetes container logs to Loki
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, k8sattributes, resource, attributes, batch]
          exporters: [loki, logging]
      
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
