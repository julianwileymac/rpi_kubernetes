# =============================================================================
# Optional: mirror MinIO credentials for Loki (same as data-services MinIO).
# Apply if you switch Helm values to use envFrom instead of inline keys.
# kubectl apply -f kubernetes/observability/loki/secret-loki-minio.yaml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: loki-minio
  namespace: observability
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin123
