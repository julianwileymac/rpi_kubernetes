# =============================================================================
# Loki Helm Values (grafana/loki)
# =============================================================================
# Install with:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   kubectl apply -f minio-secret.yaml
#   helm upgrade --install loki grafana/loki \
#     --namespace observability --create-namespace -f values.yaml
# =============================================================================

deploymentMode: SingleBinary

global:
  # Required so ${...} credentials in Loki config are expanded from env.
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-minio

minio:
  enabled: false

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  useTestSchema: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki-data
      ruler: loki-data
      admin: loki-data
    s3:
      endpoint: minio.data-services.svc.cluster.local:9000
      region: us-east-1
      accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}
      secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true
  compactor:
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
  limits_config:
    retention_period: 720h  # 30 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Zero out non-monolithic targets to avoid chart validation conflicts.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - loki.local
  annotations: {}
  tls: []

gateway:
  enabled: false
