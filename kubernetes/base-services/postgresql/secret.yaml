apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: data-services
type: Opaque
stringData:
  # Change these in production!
  postgres-password: "postgres123"
  mlflow-password: "mlflow123"
  jupyterhub-password: "jupyter123"
  datahub-password: "datahub123"
  bentoml-password: "bentoml123"
  dagster-password: "dagster123"
  ragflow-password: "ragflow123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: data-services
data:
  init.sql: |
    -- Create databases for services
    CREATE DATABASE mlflow;
    CREATE DATABASE jupyterhub;
    CREATE DATABASE datahub;
    CREATE DATABASE bentoml;
    CREATE DATABASE dagster;
    CREATE DATABASE ragflow;
    
    -- Create users
    CREATE USER mlflow WITH PASSWORD 'mlflow123';
    CREATE USER jupyterhub WITH PASSWORD 'jupyter123';
    CREATE USER datahub WITH PASSWORD 'datahub123';
    CREATE USER bentoml WITH PASSWORD 'bentoml123';
    CREATE USER dagster WITH PASSWORD 'dagster123';
    CREATE USER ragflow WITH PASSWORD 'ragflow123';
    
    -- Grant privileges
    GRANT ALL PRIVILEGES ON DATABASE mlflow TO mlflow;
    GRANT ALL PRIVILEGES ON DATABASE jupyterhub TO jupyterhub;
    GRANT ALL PRIVILEGES ON DATABASE datahub TO datahub;
    GRANT ALL PRIVILEGES ON DATABASE bentoml TO bentoml;
    GRANT ALL PRIVILEGES ON DATABASE dagster TO dagster;
    GRANT ALL PRIVILEGES ON DATABASE ragflow TO ragflow;
    
    -- Enable pgvector extension in the default (postgres) database
    CREATE EXTENSION IF NOT EXISTS vector;
    
    -- Connect to mlflow database and setup
    \c mlflow
    GRANT ALL ON SCHEMA public TO mlflow;
    CREATE EXTENSION IF NOT EXISTS vector;
    
    -- MLFlow will create its own tables on first connection
    -- No need to create tables manually
    
    -- Connect to jupyterhub database and setup
    \c jupyterhub
    GRANT ALL ON SCHEMA public TO jupyterhub;
    CREATE EXTENSION IF NOT EXISTS vector;
    
    -- Connect to datahub database and setup
    \c datahub
    GRANT ALL ON SCHEMA public TO datahub;
    
    -- Connect to bentoml database and setup
    \c bentoml
    GRANT ALL ON SCHEMA public TO bentoml;
    
    -- Connect to dagster database and setup
    \c dagster
    GRANT ALL ON SCHEMA public TO dagster;
    
    -- Connect to ragflow database and setup
    \c ragflow
    GRANT ALL ON SCHEMA public TO ragflow;
    CREATE EXTENSION IF NOT EXISTS vector;