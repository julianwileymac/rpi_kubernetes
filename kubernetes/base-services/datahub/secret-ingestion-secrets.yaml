apiVersion: v1
kind: Secret
metadata:
  name: datahub-ingestion-secrets
  namespace: data-services
  labels:
    app.kubernetes.io/name: datahub
    app.kubernetes.io/component: metadata-ingestion
type: Opaque
stringData:
  # Set a valid DataHub personal access token before enabling CronJobs.
  DATAHUB_TOKEN: "__SET_DATAHUB_TOKEN__"

  # Dedicated ingestion credentials (separate from platform runtime secrets).
  INGEST_POSTGRES_USERNAME: "datahub"
  INGEST_POSTGRES_PASSWORD: "__SET_POSTGRES_PASSWORD__"
  INGEST_MINIO_ACCESS_KEY: "__SET_MINIO_ACCESS_KEY__"
  INGEST_MINIO_SECRET_KEY: "__SET_MINIO_SECRET_KEY__"
