apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-metadata-bridge
  namespace: data-services
  labels:
    app.kubernetes.io/name: datahub
    app.kubernetes.io/component: metadata-ingestion
data:
  push_metadata.py: |
    import os
    import sys
    from typing import Iterable

    from datahub.emitter.mcp import MetadataChangeProposalWrapper
    from datahub.emitter.rest_emitter import DataHubRestEmitter
    from datahub.metadata.schema_classes import (
        DataFlowInfoClass,
        DataJobInfoClass,
        DatasetPropertiesClass,
    )


    def parse_csv_env(name: str, default: str) -> list[str]:
        value = os.getenv(name, default)
        return [item.strip() for item in value.split(",") if item.strip()]


    def data_flow_urn(orchestrator: str, flow_id: str, env: str) -> str:
        return f"urn:li:dataFlow:({orchestrator},{flow_id},{env})"


    def data_job_urn(flow_urn: str, job_id: str) -> str:
        return f"urn:li:dataJob:({flow_urn},{job_id})"


    def dataset_urn(platform: str, name: str, env: str) -> str:
        return f"urn:li:dataset:(urn:li:dataPlatform:{platform},{name},{env})"


    def emit_aspect(emitter: DataHubRestEmitter, entity_urn: str, aspect) -> None:
        proposal = MetadataChangeProposalWrapper(entityUrn=entity_urn, aspect=aspect)
        if hasattr(emitter, "emit_mcp"):
            emitter.emit_mcp(proposal)
        else:
            emitter.emit(proposal)


    def emit_dataflow_and_jobs(
        emitter: DataHubRestEmitter,
        orchestrator: str,
        flow_name: str,
        jobs: Iterable[str],
        env: str,
    ) -> None:
        flow_urn = data_flow_urn(orchestrator=orchestrator, flow_id=flow_name, env=env)
        emit_aspect(
            emitter,
            flow_urn,
            DataFlowInfoClass(
                name=flow_name,
                description=f"{orchestrator} workflow metadata bridged by datahub-metadata-bridge",
            ),
        )
        for job in jobs:
            emit_aspect(
                emitter,
                data_job_urn(flow_urn=flow_urn, job_id=job),
                DataJobInfoClass(
                    name=job,
                    description=f"{orchestrator} job metadata bridged by datahub-metadata-bridge",
                ),
            )


    def emit_dataset(
        emitter: DataHubRestEmitter,
        platform: str,
        name: str,
        env: str,
        description: str,
    ) -> None:
        emit_aspect(
            emitter,
            dataset_urn(platform=platform, name=name, env=env),
            DatasetPropertiesClass(
                description=description,
                customProperties={"metadata_source": "datahub-metadata-bridge"},
            ),
        )


    def main() -> int:
        gms_server = os.getenv(
            "DATAHUB_GMS_SERVER",
            "http://datahub-datahub-gms.data-services.svc.cluster.local:8080",
        )
        datahub_env = os.getenv("DATAHUB_ENV", "PROD")
        token = os.getenv("DATAHUB_TOKEN") or None

        argo_templates = parse_csv_env(
            "ARGO_WORKFLOWTEMPLATES",
            "pipeline-raw-ingest,pipeline-heavy-transform,pipeline-vector-sync,pipeline-cdc-sync",
        )
        argo_cronworkflows = parse_csv_env(
            "ARGO_CRONWORKFLOWS",
            "pipeline-raw-ingest-hourly,pipeline-cdc-sync-hourly",
        )
        dagster_assets = parse_csv_env(
            "DAGSTER_ASSETS",
            "minio_to_postgres_curated,vectorize_to_milvus_chroma,cdc_incremental_sync,hybrid_argo_heavy_transform",
        )
        milvus_collections = parse_csv_env("MILVUS_COLLECTIONS", "pipeline_documents")
        chroma_collections = parse_csv_env("CHROMA_COLLECTIONS", "pipeline_documents")

        emitter = DataHubRestEmitter(
            gms_server=gms_server,
            token=token,
            connect_timeout_sec=15,
            read_timeout_sec=30,
        )

        failures = []

        try:
            emit_dataflow_and_jobs(
                emitter=emitter,
                orchestrator="argo",
                flow_name="argo-workflows",
                jobs=[*argo_templates, *argo_cronworkflows],
                env=datahub_env,
            )
        except Exception as exc:
            failures.append(f"argo metadata emit failed: {exc}")

        try:
            emit_dataflow_and_jobs(
                emitter=emitter,
                orchestrator="dagster",
                flow_name="dagster-assets",
                jobs=dagster_assets,
                env=datahub_env,
            )
        except Exception as exc:
            failures.append(f"dagster metadata emit failed: {exc}")

        for collection in milvus_collections:
            try:
                emit_dataset(
                    emitter=emitter,
                    platform="milvus",
                    name=f"milvus.{collection}",
                    env=datahub_env,
                    description="Milvus collection metadata bridged from platform config",
                )
            except Exception as exc:
                failures.append(f"milvus metadata emit failed for {collection}: {exc}")

        for collection in chroma_collections:
            try:
                emit_dataset(
                    emitter=emitter,
                    platform="chromadb",
                    name=f"chromadb.{collection}",
                    env=datahub_env,
                    description="ChromaDB collection metadata bridged from platform config",
                )
            except Exception as exc:
                failures.append(f"chromadb metadata emit failed for {collection}: {exc}")

        if failures:
            for message in failures:
                print(message, file=sys.stderr)
            return 1

        print("Metadata bridge completed successfully.")
        return 0


    if __name__ == "__main__":
        raise SystemExit(main())
