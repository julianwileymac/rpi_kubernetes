apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: data-services
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: minio-init-buckets
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until wget -qO- http://minio.data-services.svc.cluster.local:9000/minio/health/ready; do
                echo "MinIO not ready, retrying in 5s..."
                sleep 5
              done
              echo "MinIO is ready"
      containers:
        - name: create-buckets
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set minio http://minio.data-services.svc.cluster.local:9000 minioadmin minioadmin123

              mc mb --ignore-existing minio/mlflow-artifacts
              mc mb --ignore-existing minio/milvus-bucket
              mc mb --ignore-existing minio/argo-workflows
              mc mb --ignore-existing minio/bentoml-artifacts
              mc mb --ignore-existing minio/dagster-artifacts
              mc mb --ignore-existing minio/iceberg-warehouse
              mc mb --ignore-existing minio/loki-data

              mc anonymous set download minio/mlflow-artifacts

              echo "All buckets created successfully"
              mc ls minio/
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/role
                    operator: In
                    values:
                      - control-plane
