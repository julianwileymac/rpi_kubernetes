# =============================================================================
# ChromaDB Deployment
# =============================================================================
# ChromaDB is a lightweight, embedded vector database perfect for development
# and rapid prototyping with LangChain/LlamaIndex.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: data-services
  labels:
    app: chromadb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.4.22
          command: ["uvicorn"]
          args:
            - "chromadb.app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--workers"
            - "1"
            - "--proxy-headers"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: "/chroma-data"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "chromadb"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
          volumeMounts:
            - name: data
              mountPath: /chroma-data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chromadb-data
      # Prefer scheduling on control plane
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/role
                    operator: In
                    values:
                      - control-plane
