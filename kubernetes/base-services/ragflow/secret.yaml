# =============================================================================
# RAGFlow Secrets
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ragflow-secrets
  namespace: data-services
  labels:
    app: ragflow
type: Opaque
stringData:
  # PostgreSQL
  pg-host: postgresql.data-services.svc.cluster.local
  pg-port: "5432"
  pg-database: ragflow
  pg-user: ragflow
  pg-password: ragflow123

  # MinIO
  minio-host: minio.data-services.svc.cluster.local
  minio-port: "9000"
  minio-user: minioadmin
  minio-password: minioadmin123

  # Redis
  redis-host: ragflow-redis.data-services.svc.cluster.local
  redis-port: "6379"
  redis-password: ragflow123

  # Elasticsearch
  es-host: elasticsearch-master.data-services.svc.cluster.local
  es-port: "9200"
  es-user: elastic
  es-password: ""

  # RAGFlow encryption key (used for token signing)
  secret-key: ragflow-rpi-k8s-secret-key-change-me
