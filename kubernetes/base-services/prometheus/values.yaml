# =============================================================================
# kube-prometheus-stack Helm Values
# =============================================================================
# Install with:
#   helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace observability --create-namespace -f values.yaml
# =============================================================================

# Global settings
fullnameOverride: prometheus

# Grafana configuration
grafana:
  enabled: true
  adminPassword: "admin123"
  
  service:
    type: LoadBalancer
    port: 3000
  
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local
  
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  
  # Default dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  
  dashboards:
    default:
      k3s-cluster:
        gnetId: 15757
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus
      minio:
        gnetId: 13502
        revision: 2
        datasource: Prometheus
      ray:
        gnetId: 12006
        revision: 1
        datasource: Prometheus
      mlflow:
        gnetId: 12708
        revision: 1
        datasource: Prometheus
      workflow-orchestrators:
        json: |
          {
            "title": "Workflow Orchestrators - Argo and Dagster",
            "uid": "workflow-orchestrators",
            "schemaVersion": 39,
            "version": 1,
            "tags": ["argo", "dagster", "mlops"],
            "timezone": "",
            "editable": true,
            "time": {
              "from": "now-6h",
              "to": "now"
            },
            "panels": [
              {
                "type": "stat",
                "title": "Argo Targets Up",
                "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(up{job=~\".*argo-workflows-controller.*\"})",
                    "refId": "A"
                  }
                ],
                "options": {
                  "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                  "colorMode": "value",
                  "graphMode": "none",
                  "justifyMode": "center"
                },
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
                    }
                  },
                  "overrides": []
                }
              },
              {
                "type": "stat",
                "title": "Dagster Targets Up",
                "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(up{job=~\".*dagster-webserver.*\"})",
                    "refId": "A"
                  }
                ],
                "options": {
                  "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
                  "colorMode": "value",
                  "graphMode": "none",
                  "justifyMode": "center"
                },
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]
                    }
                  },
                  "overrides": []
                }
              },
              {
                "type": "timeseries",
                "title": "Argo Scrape Samples",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(scrape_samples_scraped{job=~\".*argo-workflows-controller.*\"})",
                    "legendFormat": "argo-samples",
                    "refId": "A"
                  }
                ]
              },
              {
                "type": "timeseries",
                "title": "Dagster Scrape Samples",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(scrape_samples_scraped{job=~\".*dagster-webserver.*\"})",
                    "legendFormat": "dagster-samples",
                    "refId": "A"
                  }
                ]
              },
              {
                "type": "timeseries",
                "title": "Argo Workflow Throughput (if exported)",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(rate(argo_workflows_count[5m]))",
                    "legendFormat": "workflows/sec",
                    "refId": "A"
                  }
                ]
              },
              {
                "type": "timeseries",
                "title": "Dagster Process CPU (if exported)",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
                "datasource": null,
                "targets": [
                  {
                    "expr": "sum(rate(process_cpu_seconds_total{job=~\".*dagster-webserver.*\"}[5m]))",
                    "legendFormat": "cpu-seconds/sec",
                    "refId": "A"
                  }
                ]
              }
            ],
            "templating": {"list": []},
            "annotations": {"list": []}
          }
  
  # Additional data sources
  additionalDataSources:
    - name: Jaeger
      type: jaeger
      url: http://jaeger-query.observability:16686
      access: proxy
      isDefault: false
    - name: Loki
      type: loki
      url: http://loki.observability:3100
      access: proxy
      isDefault: false
    - name: VictoriaMetrics
      type: prometheus
      url: http://victoriametrics.observability:8428
      access: proxy
      isDefault: false

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 15GB
    
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    
    # Allow discovering ServiceMonitors in all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    
    # Remote write to VictoriaMetrics for long-term storage
    remoteWrite:
      - url: http://victoriametrics.observability:8428/api/v1/write
        queueConfig:
          maxSamplesPerSend: 1000
          maxShards: 200
          capacity: 10000
    
    # Additional scrape configs for MinIO
    additionalScrapeConfigs:
      - job_name: minio
        metrics_path: /minio/v2/metrics/cluster
        scheme: http
        static_configs:
          - targets:
              - minio.data-services.svc.cluster.local:9000

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.local

# AlertManager
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.local

# Node Exporter (deployed on all nodes)
nodeExporter:
  enabled: true
  
  # Tolerations to run on all nodes including control plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# Kube-state-metrics
kubeStateMetrics:
  enabled: true

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    general: true
    k8s: true
    kubeApiserver: true
    kubePrometheusGeneral: true
    kubePrometheusNodeAlerting: true
    kubeScheduler: true
    kubeStateMetrics: true
    kubelet: true
    network: true
    node: true
    prometheus: true

# Disable components not needed for k3s
kubeEtcd:
  enabled: false  # k3s uses embedded etcd differently

kubeControllerManager:
  enabled: false  # Not exposed in k3s by default

kubeScheduler:
  enabled: false  # Not exposed in k3s by default
